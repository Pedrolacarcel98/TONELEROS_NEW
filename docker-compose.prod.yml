services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python run_prod.py
    expose:
      - "8000"
    environment:
      - DATABASE_URL=sqlite:////data/toneleros.db
      - SECRET_KEY=toneleros-super-secret-key-2026
      - DEBUG=False
      - ALLOWED_ORIGINS=["https://toneleros.in"]
    volumes:
      - backend_data:/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=https://toneleros.in/api
    expose:
      - "3000"
    depends_on:
      - backend
    restart: always

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  backend_data:
  caddy_data:
  caddy_config:
